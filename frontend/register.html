<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aptos — Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🏠</div>
      <div>
        <div class="logo-text">Ap<span>tos</span></div>
      </div>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Join your gated society portal</p>

    <div id="regError" class="alert alert-error hidden">
      <span>⚠</span> <span id="regErrorMsg"></span>
    </div>
    <div id="regSuccess" class="alert alert-success hidden">
      <span>✓</span> Account created! <a href="login.html" style="color:var(--green);">Sign in now →</a>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="regPhone" placeholder="+91 9999999999" />
      </div>
    </div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="regEmail" placeholder="you@example.com" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="regRole" onchange="toggleFlatField()">
          <option value="resident">Resident</option>
          <option value="security">Security Guard</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group" id="flatGroup">
        <label>Flat Number</label>
        <input type="text" id="regFlat" placeholder="e.g. A-101" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Repeat password" />
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="regBtn" onclick="handleRegister()">
      Create Account
    </button>

    <p style="text-align:center; margin-top:20px; font-size:0.88rem; color:var(--text-muted);">
      Already have an account?
      <a href="login.html" style="color:var(--accent);">Sign in</a>
    </p>

  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('aptos_token')) {
    window.location.href = 'dashboard.html';
  }

  // Show/hide flat number field based on role
  function toggleFlatField() {
    const role = document.getElementById('regRole').value;
    const flatGroup = document.getElementById('flatGroup');
    flatGroup.style.display = role === 'resident' ? 'block' : 'none';
  }

  async function handleRegister() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm  = document.getElementById('regConfirm').value;
    const role     = document.getElementById('regRole').value;
    const flatNumber = document.getElementById('regFlat').value.trim();
    const phone    = document.getElementById('regPhone').value.trim();

    const errorDiv = document.getElementById('regError');
    const errorMsg = document.getElementById('regErrorMsg');
    const successDiv = document.getElementById('regSuccess');
    const btn = document.getElementById('regBtn');

    errorDiv.classList.add('hidden');
    successDiv.classList.add('hidden');

    // Validation
    if (!name || !email || !password) {
      errorDiv.classList.remove('hidden');
      errorMsg.textContent = 'Please fill in all required fields.';
      return;
    }
    if (password !== confirm) {
      errorDiv.classList.remove('hidden');
      errorMsg.textContent = 'Passwords do not match.';
      return;
    }
    if (password.length < 6) {
      errorDiv.classList.remove('hidden');
      errorMsg.textContent = 'Password must be at least 6 characters.';
      return;
    }
    if (role === 'resident' && !flatNumber) {
      errorDiv.classList.remove('hidden');
      errorMsg.textContent = 'Flat number is required for residents.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      const res = await fetch('https://aptos-backend-vofg.onrender.com/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role, flatNumber, phone }),
      });

      const data = await res.json();

      if (data.success) {
        successDiv.classList.remove('hidden');
        // Auto-login after registration
        setTimeout(() => {
          localStorage.setItem('aptos_token', data.token);
          localStorage.setItem('aptos_user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        errorDiv.classList.remove('hidden');
        errorMsg.textContent = data.message || 'Registration failed.';
      }
    } catch (err) {
      errorDiv.classList.remove('hidden');
      errorMsg.textContent = 'Cannot connect to server. Make sure the backend is running.';
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }
</script>

</body>
</html>
